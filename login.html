<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Game Playlist App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="login-body">
  <div class="login-container">
    <div class="login-box">
      <h1>Game Playlist App</h1>
      <h2>Sign In</h2>
      <input type="number" id="userId" placeholder="Enter User ID" />
      <button id="loginBtn">Login</button>
      <p id="loginMessage" class="login-message"></p>
    </div>
  </div>

  <script>
    const baseUrl = "http://localhost:3000";
    const loginBtn = document.getElementById("loginBtn");
    const userIdInput = document.getElementById("userId");
    const loginMessage = document.getElementById("loginMessage");

    loginBtn.addEventListener("click", loginUser);
    userIdInput.addEventListener("keypress", function (e) {
      if (e.key === "Enter") {
        loginUser();
      }
    });

    async function loginUser() {
      const userId = userIdInput.value.trim();

      if (!userId) {
        loginMessage.textContent = "Please enter a user ID.";
        return;
      }

      try {
        const res = await fetch(`${baseUrl}/users/${userId}`);
        const data = await res.json();

        if (!res.ok) {
          loginMessage.textContent = data.error || "User not found.";
          return;
        }

        localStorage.setItem("userId", userId);
        localStorage.removeItem("activePlaylistId");
        window.location.href = "index.html";
      } catch (err) {
        loginMessage.textContent = "Could not connect to server.";
      }
    }
  </script>
</body>
</html>
