<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GameVault</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="top-bar">
      <h1>GameVault</h1>
      <div class="user-bar">
        <span id="currentUser"></span>
        <button id="logoutBtn">Logout</button>
      </div>
    </div>

    <div class="nav-tabs">
      <button id="homeTabBtn">Home</button>
      <button id="playlistTabBtn">Playlists</button>
    </div>

    <div id="homeSection">
      <div class="toolbar-box">
        <div class="search-row">
          <input type="text" id="searchInput" placeholder="Search games by name" />
          <button id="searchBtn">Search</button>
          <button id="showAllBtn">Show All</button>
        </div>

        <div class="filter-row">
          <span id="filterLabel">No filter selected</span>
          <button id="clearFilterBtn">Clear Filter</button>
        </div>
      </div>

      <div class="panel">
        <h2>All Games</h2>
        <div id="gamesList"></div>
      </div>
    </div>

    <div id="playlistSection" class="hidden">
      <div class="panel">
        <h2>My Playlists</h2>

        <div class="playlist-controls">
          <select id="playlistSelect"></select>
          <input type="text" id="newPlaylistName" placeholder="New playlist name" />
          <button id="createPlaylistBtn">Create Playlist</button>
          <button id="deletePlaylistBtn">Delete Playlist</button>
        </div>

        <h3 id="activePlaylistTitle">Selected Playlist</h3>
        <div id="playlistList"></div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
